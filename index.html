<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strava Running Analysis</title>
    <link rel="stylesheet" href="./public/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="page-head">
        <p class="eyebrow">Strava Analysis</p>
        <h1>Run the TypeScript server</h1>
      </section>
      <section class="summary-grid" aria-label="Setup instructions">
        <article class="metric-card feature-card">
          <span>Command</span>
          <strong>node</strong>
          <small>Run <code>node src/presentation/http/server.ts</code>, then open <code>http://127.0.0.1:5173</code>.</small>
        </article>
      </section>
    </main>
  </body>
</html>
